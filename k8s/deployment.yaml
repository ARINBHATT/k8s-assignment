apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-container
          image: your-dockerhub-username/flask-k8s-app:latest
          imagePullPolicy: Always          # ← Always pull from registry
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "1.0"